<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Taskify — Your Digital Command Center</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;600&family=Syne:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg-void: #080c10; --bg-deep: #0c1117; --bg-panel: #111820; --bg-card: #151e28;
    --bg-hover: #1a2535; --border: #1e2d3d; --border-glow: #243447;
    --text-primary: #e2eaf4; --text-secondary: #7a9bbf; --text-muted: #3d5a7a;
    --accent-cyan: #00d4ff; --accent-green: #00ff88; --accent-rose: #f43f5e;
    --glow-cyan: 0 0 20px rgba(0,212,255,0.15); --radius: 10px; --radius-lg: 14px;
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Syne', sans-serif; background: var(--bg-void); color: var(--text-primary); min-height: 100vh; }
  .sidebar { position: fixed; left: 0; top: 0; bottom: 0; width: 240px; background: var(--bg-deep); border-right: 1px solid var(--border); display: flex; flex-direction: column; padding: 0 0 24px; }
  .logo { padding: 28px 24px 20px; border-bottom: 1px solid var(--border); }
  .logo-mark { font-size: 22px; font-weight: 800; }
  .logo-mark span { color: var(--accent-cyan); }
  .nav { flex: 1; padding: 16px 12px; }
  .nav-item { display: flex; align-items: center; gap: 12px; padding: 10px 12px; border-radius: var(--radius); color: var(--accent-cyan); background: var(--bg-panel); border: 1px solid var(--border-glow); }
  .main { margin-left: 240px; padding: 0; }
  .topbar { position: sticky; top: 0; background: rgba(8,12,16,0.85); backdrop-filter: blur(20px); border-bottom: 1px solid var(--border); padding: 16px 32px; display: flex; align-items: center; justify-content: space-between; }
  .btn { padding: 9px 18px; border-radius: var(--radius); font-weight: 600; cursor: pointer; border: 1px solid transparent; transition: 0.2s; }
  .btn-primary { background: var(--accent-cyan); color: var(--bg-void); }
  .btn-primary:hover { box-shadow: var(--glow-cyan); }
  .view { padding: 28px 32px; }
  .stats-row { display: grid; grid-template-columns: repeat(2, 1fr); gap: 16px; margin-bottom: 28px; }
  .stat-card { background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 18px; }
  .stat-value { font-size: 32px; font-weight: 800; }
  .task-list { display: flex; flex-direction: column; gap: 8px; }
  .task-item { background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius); padding: 14px 16px; display: flex; align-items: center; gap: 14px; }
  .task-item.completed { opacity: 0.5; }
  .task-check { width: 20px; height: 20px; border-radius: 6px; border: 2px solid var(--border-glow); cursor: pointer; }
  .task-check.checked { background: var(--accent-green); }
  .priority-badge { font-family: 'JetBrains Mono', monospace; font-size: 10px; padding: 3px 8px; border-radius: 4px; text-transform: uppercase; }
  .priority-high { color: var(--accent-rose); background: rgba(244,63,94,0.1); }
  .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.7); display: flex; align-items: center; justify-content: center; z-index: 100; }
  .modal { background: var(--bg-panel); padding: 28px; border-radius: var(--radius-lg); width: 100%; max-width: 400px; }
  .form-input, .form-select { width: 100%; background: var(--bg-deep); border: 1px solid var(--border); padding: 10px; color: white; margin-bottom: 15px; border-radius: 5px; }
  .toast-container { position: fixed; bottom: 20px; right: 20px; }
</style>
</head>
<body>

<nav class="sidebar">
  <div class="logo">
    <div class="logo-mark">Task<span>ify</span></div>
  </div>
  <div class="nav">
    <div class="nav-item">
      <span>⚡</span><span>Tasks</span>
    </div>
  </div>
</nav>

<main class="main">
  <div class="topbar">
    <div class="page-title">⚡ Tasks</div>
    <button class="btn btn-primary" onclick="openModal()">+ Add Task</button>
  </div>

  <div class="view">
    <div class="stats-row">
      <div class="stat-card">
        <div style="color: var(--text-muted); font-size: 12px;">TOTAL</div>
        <div class="stat-value" id="stat-total" style="color: var(--accent-cyan)">0</div>
      </div>
      <div class="stat-card">
        <div style="color: var(--text-muted); font-size: 12px;">DONE</div>
        <div class="stat-value" id="stat-done" style="color: var(--accent-green)">0</div>
      </div>
    </div>

    <div class="task-list" id="task-list">
      <div style="color: var(--text-muted)">// Loading tasks...</div>
    </div>
  </div>
</main>

<div class="modal-overlay" id="task-modal" style="display:none">
  <div class="modal">
    <h3 style="margin-bottom: 20px;">New Task</h3>
    <input type="text" id="task-title" class="form-input" placeholder="Task name...">
    <select id="task-priority" class="form-select">
      <option value="low">Low</option>
      <option value="medium" selected>Medium</option>
      <option value="high">High</option>
    </select>
    <div style="display:flex; gap:10px; justify-content: flex-end;">
      <button class="btn" onclick="closeModal()" style="color:white">Cancel</button>
      <button class="btn btn-primary" onclick="saveTask()">Save</button>
    </div>
  </div>
</div>

<div class="toast-container" id="toast-container"></div>

<script>
const API_URL = 'https://task-manager-p7x9.onrender.com/api/tasks';
let allTasks = [];

window.onload = loadTasks;

async function loadTasks() {
  try {
    const res = await fetch(API_URL);
    allTasks = await res.json();
    renderTasks();
    updateStats();
  } catch(e) {
    document.getElementById('task-list').innerHTML = "Error connecting to server.";
  }
}

function renderTasks() {
  const list = document.getElementById('task-list');
  if (!allTasks.length) {
    list.innerHTML = '<div style="color:var(--text-muted)">No tasks found.</div>';
    return;
  }
  list.innerHTML = allTasks.map(t => `
    <div class="task-item ${t.completed ? 'completed' : ''}">
      <div class="task-check ${t.completed ? 'checked' : ''}" onclick="toggleTask('${t._id}', ${t.completed})"></div>
      <div style="flex:1">${t.title}</div>
      <span class="priority-badge priority-${t.priority}">${t.priority}</span>
      <button onclick="deleteTask('${t._id}')" style="background:none; border:none; cursor:pointer; font-size:16px;">🗑️</button>
    </div>
  `).join('');
}

async function saveTask() {
  const title = document.getElementById('task-title').value;
  const priority = document.getElementById('task-priority').value;
  if(!title) return;

  await fetch(API_URL, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ title, priority, completed: false })
  });
  
  document.getElementById('task-title').value = '';
  closeModal();
  loadTasks();
}

async function toggleTask(id, status) {
  await fetch(`${API_URL}/${id}`, {
    method: 'PUT',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ completed: !status })
  });
  loadTasks();
}

async function deleteTask(id) {
  await fetch(`${API_URL}/${id}`, { method: 'DELETE' });
  loadTasks();
}

function updateStats() {
  document.getElementById('stat-total').textContent = allTasks.length;
  document.getElementById('stat-done').textContent = allTasks.filter(t => t.completed).length;
}

function openModal() { document.getElementById('task-modal').style.display = 'flex'; }
function closeModal() { document.getElementById('task-modal').style.display = 'none'; }
</script>

</body>
</html>
